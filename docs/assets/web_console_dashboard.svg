<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" fill="none" viewBox="0 0 800 400">
  <rect width="800" height="400" fill="#f8fafc" rx="8" />
  <!-- Sidebar -->
  <rect width="200" height="400" fill="#f8fafc" rx="8" />
  <path stroke="#e2e8f0" d="M200 0v400" />
  <text x="20" y="40" fill="#0f172a" font-family="sans-serif" font-size="14" font-weight="600">PointCloud-GeoLab</text>
  <text x="20" y="60" fill="#64748b" font-family="sans-serif" font-size="10">Experimental Web Console</text>
  
  <rect x="10" y="80" width="180" height="30" fill="#e2e8f0" rx="4" />
  <text x="20" y="100" fill="#0f172a" font-family="sans-serif" font-size="12" font-weight="500">Dashboard</text>
  <text x="20" y="140" fill="#334155" font-family="sans-serif" font-size="12">Datasets</text>
  <text x="20" y="180" fill="#334155" font-family="sans-serif" font-size="12">Registration</text>
  
  <!-- Topbar -->
  <path stroke="#e2e8f0" d="M200 60h600" />
  <rect x="220" y="20" width="160" height="24" fill="#f1f5f9" rx="4" />
  <text x="230" y="36" fill="#334155" font-family="sans-serif" font-size="11">Python 3.10-3.12 backend</text>
  
  <!-- Main Content -->
  <rect x="220" y="80" width="560" height="80" fill="#ffffff" rx="8" stroke="#e2e8f0" />
  <text x="240" y="110" fill="#0f172a" font-family="sans-serif" font-size="18" font-weight="600">Dashboard</text>
  <text x="240" y="135" fill="#64748b" font-family="sans-serif" font-size="12">Experimental reviewer console for the PointCloud-GeoLab geometry core.</text>
  
  <!-- Cards -->
  <rect x="220" y="180" width="170" height="180" fill="#ffffff" rx="8" stroke="#e2e8f0" />
  <text x="240" y="210" fill="#0f172a" font-family="sans-serif" font-size="14" font-weight="600">Workflow</text>
  <circle cx="245" cy="240" r="4" fill="#10b981" />
  <text x="260" y="244" fill="#334155" font-family="sans-serif" font-size="11">Upload Dataset</text>
  <circle cx="245" cy="270" r="4" fill="#10b981" />
  <text x="260" y="274" fill="#334155" font-family="sans-serif" font-size="11">Preview Geometry</text>
  <circle cx="245" cy="300" r="4" fill="#3b82f6" />
  <text x="260" y="304" fill="#334155" font-family="sans-serif" font-size="11">Run Task</text>

  <rect x="410" y="180" width="370" height="85" fill="#ffffff" rx="8" stroke="#e2e8f0" />
  <text x="430" y="210" fill="#0f172a" font-family="sans-serif" font-size="14" font-weight="600">Datasets</text>
  <text x="430" y="235" fill="#64748b" font-family="sans-serif" font-size="12">4 datasets available for processing.</text>
  <rect x="680" y="215" width="80" height="24" fill="#3b82f6" rx="4" />
  <text x="690" y="231" fill="#ffffff" font-family="sans-serif" font-size="11">Manage</text>

  <rect x="410" y="280" width="370" height="80" fill="#ffffff" rx="8" stroke="#e2e8f0" />
  <text x="430" y="310" fill="#0f172a" font-family="sans-serif" font-size="14" font-weight="600">Experimental Boundaries</text>
  <text x="430" y="335" fill="#64748b" font-family="sans-serif" font-size="11">No full nonlinear GICP • No SLAM backend • No CUDA stack</text>
</svg>
